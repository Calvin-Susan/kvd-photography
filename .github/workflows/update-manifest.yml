name: Update photos manifest

on:
  push:
    branches: [main]
    paths:
      - "photos/**"
      - "generate-manifest.mjs"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-manifest
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate photos.json
        run: node generate-manifest.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- photos.json; then
            echo "photos.json unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add photos.json
          git commit -m "Auto-update photos.json"
          git push
